name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. جلب الملفات من المستودع (بما فيها ملف الـ zip)
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. أمر فك الضغط التلقائي والبحث عن ملفات فلاتر
      - name: Decompress Project File (ZIP)
        run: |
          echo "=== جاري فك ضغط ملف المشروع ==="
          unzip -q neural_craft_flutter.zip -d extracted_project
          echo "=== تم فك الضغط بنجاح ==="
          
          # التحقق من مكان وجود ملف pubspec.yaml تلقائياً لتجنب مشاكل المسارات
          cd extracted_project
          if [ -f "pubspec.yaml" ]; then
            echo "PROJECT_DIR=$(pwd)" >> $GITHUB_ENV
          else
            INNER_DIR=$(find . -maxdepth 2 -name "pubspec.yaml" -exec dirname {} \;)
            if [ ! -z "$INNER_DIR" ]; then
              cd $INNER_DIR
              echo "PROJECT_DIR=$(pwd)" >> $GITHUB_ENV
            else
              echo "خطأ: لم يتم العثور على ملف pubspec.yaml داخل الملف المضغوط!"
              
