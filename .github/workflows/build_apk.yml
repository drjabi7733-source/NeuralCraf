name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. جلب الكود من المستودع
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. البحث عن أي ملف zip وفكه تلقائياً
      - name: Decompress Project File (ZIP)
        run: |
          echo "=== جاري البحث عن ملفات مضغوطة وفكها ==="
          ZIP_FILE=$(ls *.zip 2>/dev/null | head -n 1)
          if [ -z "$ZIP_FILE" ]; then
            echo "خطأ: لم يتم العثور على أي ملف ينتهي بـ .zip في المستودع!"
            echo "تأكد من رفع ملف مشروعك المضغوط إلى الصفحة الرئيسية في جيتهاب."
            exit 1
          fi
          echo "تم العثور على الملف: $ZIP_FILE"
          unzip -q "$ZIP_FILE" -d extracted_project
          echo "=== تم فك الضغط بنجاح ==="
          ls -la extracted_project

      # 3. إعداد الجافا
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'oracle'
          java-version: '17'

      # 4. إعداد الفلاتر
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # 5. الدخول للمجلد وبناء التطبيق
      - name: Build APK
        run: |
          cd extracted_project
          # إذا كان هناك مجلد داخلي بنفس الاسم، سينتقل إليه السكريبت تلقائياً
          if [ -d "neural_craft_flutter" ]; then cd neural_craft_flutter; fi
          flutter pub get
          flutter build apk --release

      # 6. استخراج ملف الـ APK للتحميل
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: NeuralCraft-APK
          path: |
            extracted_project/build/app/outputs/flutter-apk/app-release.apk
            extracted_project/*/build/app/outputs/flutter-apk/app-release.apk
            
