name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. جلب الكود من المستودع
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. البحث عن ملف الـ ZIP وفكه
      - name: Decompress Project File (ZIP)
        run: |
          echo "=== جاري البحث عن ملف مشروعك وفكه ==="
          ZIP_FILE=$(ls *.zip 2>/dev/null | head -n 1)
          if [ -z "$ZIP_FILE" ]; then
            echo "خطأ: لم يتم العثور على ملف مضغوط!"
            exit 1
          fi
          unzip -q "$ZIP_FILE" -d extracted_project
          echo "=== تم فك الضغط بنجاح ==="

      # 3. إعداد الجافا 17
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'oracle'
          java-version: '17'

      # 4. إعداد أحدث إصدار مستقر من الفلاتر
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # 5. تنظيف البيئة وتخطي الأخطاء وبناء الـ APK
      - name: Build APK
        run: |
          cd extracted_project
          if [ -d "neural_craft_flutter" ]; then cd neural_craft_flutter; fi
          
          echo "=== جاري حل تعارض الحزم وترقيتها ==="
          flutter pub add intl:^0.20.2 --manually
          flutter pub get
          
          echo "=== جاري إصلاح ملفات الأندرويد لـ V2 Embedding بالقوة ==="
          # تعديل ملفات المانيفست
          find . -name "AndroidManifest.xml" -exec sed -i '/<\/activity>/i \        <meta-data android:name="flutterEmbedding" android:value="2" \/>' {} \;
          
          # مسح وتعديل أي سطر قديم في ملفات جافا أو كوتلن يحاول استدعاء FlutterActivity القديم
          find . -name "*.kt" -exec sed -i 's/io.flutter.app.FlutterActivity/io.flutter.embedding.android.FlutterActivity/g' {} \;
          find . -name "*.java" -exec sed -i 's/io.flutter.app.FlutterActivity/io.flutter.embedding.android.FlutterActivity/g' {} \;

          echo "=== جاري بناء التطبيق النهائي الآن ==="
          # إضافة علم تخطي القيود وتجاوز فحص الحزم لضمان إخراج ملف الـ APK
          flutter build apk --release --no-sound-null-safety

      # 6. رفع ملف الـ APK للتحميل الفوري
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: NeuralCraft-Final-APK
          path: |
            extracted_project/build/app/outputs/flutter-apk/app-release.apk
            extracted_project/*/build/app/outputs/flutter-apk/app-release.apk

          
