name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. جلب الكود من المستودع
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. البحث عن ملف الـ ZIP وفكه
      - name: Decompress Project File (ZIP)
        run: |
          echo "=== جاري البحث عن ملفات مضغوطة وفكها ==="
          ZIP_FILE=$(ls *.zip 2>/dev/null | head -n 1)
          if [ -z "$ZIP_FILE" ]; then
            echo "خطأ: لم يتم العثور على ملف مضغوط!"
            exit 1
          fi
          unzip -q "$ZIP_FILE" -d extracted_project
          echo "=== تم فك الضغط بنجاح ==="

      # 3. إعداد الجافا (إصدار 17 الحديث المتوافق مع gradle.kts)
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'oracle'
          java-version: '17'

      # 4. إعداد أحدث إصدار مستقر من الفلاتر
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # 5. إصلاح الحزم والـ Embedding وبناء التطبيق
      - name: Build APK
        run: |
          cd extracted_project
          if [ -d "neural_craft_flutter" ]; then cd neural_craft_flutter; fi
          
          echo "=== جاري حل تعارض حزمة اللغات ==="
          flutter pub add intl:^0.20.2
          
          echo "=== جاري تحميل الحزم ==="
          flutter pub get
          
          echo "=== جاري إصلاح مشكلة الـ Embedding داخل ملف المانيفست تلقائياً ==="
          # هذا السطر يبحث عن ملف المانيفست ويضيف وسم البيئة الحديثة v2 لتخطي مشكلة الـ v1 تماماً بدون تخريب الـ Gradle
          find . -name "AndroidManifest.xml" -exec sed -i '/<\/activity>/i \        <meta-data android:name="flutterEmbedding" android:value="2" \/>' {} \;
          
          echo "=== جاري بناء التطبيق الآن ==="
          flutter build apk --release

      # 6. استخراج ملف الـ APK للتحميل عند النجاح
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: NeuralCraft-APK
          path: |
            extracted_project/build/app/outputs/flutter-apk/app-release.apk
            extracted_project/*/build/app/outputs/flutter-apk/app-release.apk
            
